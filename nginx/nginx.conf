events {

}

http {
  error_log /var/cache/nginx/error_log.log warn;
  client_max_body_size 20m;

  server {

    location ~ ^/api/v1/action-history/[0-9]+/stream/ {
      proxy_pass http://webapp:8000;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 1850s;
    }

    location ~ ^/api/v1/jenkins/jobs/ {
      proxy_pass http://webapp:8000;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 1850s;
    }

    location / {
      proxy_pass http://webapp:8000;
      rewrite ^/webapp(.*)$ $1 break;
    }

    listen 8000;
    listen 443 ssl;
    ssl_certificate /etc/certificate/nginx-certificate.crt;
    ssl_certificate_key /etc/certificate/nginx-certificate-key.key;
    }
}
