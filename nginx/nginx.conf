events {

}

http {
  error_log /var/cache/nginx/error_log.log warn;
  client_max_body_size 20m;

  server {

    location ~ ^/api/v1/action-history/[0-9]+/stream/ {
      proxy_pass http://webapp:8000;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 1850s;
    }

    location ~ ^/api/v1/jenkins/jobs/ {
      proxy_pass http://webapp:8000;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 1850s;
    }

    # Reverse-proxy the Jenkins UI so the SPA can deep-link to a job's page
    # (/jenkins/job/<job>/). Jenkins serves natively under the /jenkins prefix
    # (--prefix=/jenkins), so it emits correctly-prefixed URLs and the proxy can
    # pass requests straight through with no response-body rewriting.
    location /jenkins/ {
      proxy_pass http://jenkins:8080/jenkins/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /jenkins;
    }

    location / {
      proxy_pass http://webapp:8000;
    }

    listen 8000;
    listen 443 ssl;
    ssl_certificate /etc/certificate/nginx-certificate.crt;
    ssl_certificate_key /etc/certificate/nginx-certificate-key.key;
    }
}
