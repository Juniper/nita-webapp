<html>
<head>
{% load static %}
{% load i18n %}
<title>{% trans "network_type_heading" %}</title>
<script src="{% static 'global/js/campus_type_mgmt.js' %}"></script>
<link rel="stylesheet" type="text/css" href="{% static 'components/loader/css/loader.css' %}" />

<script>
var CAMPUS_TYPE_ID = {{ campus_type_id }};

function renderCampusTypeSummary(data) {
    $('#ct-name').text(data.name || '');
    $('#ct-zip').text(data.app_zip_name || '');
    $('#ct-description').text(data.description || '');
}

jQuery(document).ready(function($) {
    $('#main_pane').css("display","none");

    renderCampusTypeSummary({
        name: "{{ campus_type.name|escapejs }}",
        app_zip_name: "{{ campus_type.app_zip_name|escapejs }}",
        description: "{{ campus_type.description|escapejs }}"
    });

    $.ajax({
        type: "GET",
        url: "/api/v1/network-types/" + CAMPUS_TYPE_ID + "/",
        success: function(data) {
            renderCampusTypeSummary(data);
        }
    });

    setTimeout(function() {
        if (typeof campus_network_table !== 'undefined' && campus_network_table != null) {
            campus_network_table.destroy();
        }
        campus_network_table = $('#CampusNetwork').DataTable({
            "paging":   true,
            "ordering": false,
            "info":     false,
            "bFilter": false,
            "bInfo": false,
            "pageLength": 5,
            "bLengthChange": false,
            "ajax": {
                "url": "/api/v1/networks/?campus_type_id=" + CAMPUS_TYPE_ID + "&page_size=1000",
                "dataSrc": "results"
            },
            "columns": [
                {"data": "id"},
                {"data": "name"},
                {"data": "description"},
                {"data": "status"}
            ],
            "aoColumnDefs": [{ "bVisible": false, "aTargets": [0] }]
        });

        if (typeof campus_type_actions_table !== 'undefined' && campus_type_actions_table != null) {
            campus_type_actions_table.destroy();
        }
        campus_type_actions_table = $('#Action').DataTable({
            "paging":   true,
            "ordering": false,
            "info":     false,
            "bFilter": false,
            "bInfo": false,
            "bLengthChange": false,
            "ajax": {
                "url": "/api/v1/actions/?campus_type_id=" + CAMPUS_TYPE_ID + "&page_size=1000",
                "dataSrc": "results"
            },
            "columns": [
                {"data": "id"},
                {"data": "action_name"},
                {"data": "action_category.category_name"},
                {"data": "jenkins_url"}
            ],
            "aoColumnDefs": [{ "bVisible": false, "aTargets": [0] }]
        });

        $('#main_pane').css("display","unset");
    }, 100);

    fieldset.scheduler-border {
    border: 1px groove #ddd !important;
    padding: 0 1.0em 1.0em 1.0em !important;
    margin: 0 0 1.0em 0 !important;
    -webkit-box-shadow:  0px 0px 0px 0px #000;
            box-shadow:  0px 0px 0px 0px #000;
    }

    legend.scheduler-border {
        text-align: left !important;
        padding:0 10px;
        border-bottom:none;
        margin-bottom: 5px;
    }

</style>
</head>
<body>
    <div class="col-md-12">
        <div class="col-md-10" style="padding-left:0px;">
            <fieldset  class="scheduler-border">
                <legend class="scheduler-border" style="padding-left:5px"><h3>Summary</h3></legend>
                <div style="padding:0px 0px 0px 0px" class="col-md-4">
                    <table>
                        <tr>
                            <td><label>Name : </label></td>
                            <td id="ct-name">{{ campus_type.name }}</td>
                        </tr>
                        <tr>
                            <td><label>Application Zip : </label></td>
                            <td id="ct-zip">{{ campus_type.app_zip_name }}</td>
                        </tr>
                        <tr>
                            <td><label>Description : </label></td>
                            <td id="ct-description">{{ campus_type.description }}</td>
                        </tr>
                    </table>
                 </div>
                <div style="text-align: left; padding:10px 2px 23px 0;" class="col-md-3">
                    <button id="del_campus-btn" type="button" class="btn btn-default btn-sm" onclick="deleteCampusTypesbyId(CAMPUS_TYPE_ID)"><span class="fa fa-trash fa-custom"></span> Delete</button>
                 </div>
             </fieldset>
               <div>
                    <div id="actions-by-campus-type">
                    <h3 style="padding-left:2px; padding-bottom:3px">Actions</h3>
                    <table id="Action" class="table table-condensed table-bordered">
                        <thead><tr><th>Id</th><th>Name</th><th>Category</th><th>Jenkins URL</th></tr></thead>
                        <tbody></tbody>
                    </table>
                    </div>
            </div>

            <!-- <div class="col-md-12" style="padding-left:0px !important">
                <h3 style="padding-left:2px; padding-bottom:3px">Roles and Resources</h3>
                <div class="col-md-6" style="padding-left:0px !important">
                    {% load django_tables2 %}
                    {% if roles_table %}
                    {% render_table roles_table %}
                    {% endif %}
                </div>
                <div class="col-md-6">
                    {% load django_tables2 %}
                    {% if resources_table %}
                    {% render_table  resources_table %}
                    {% endif %}
                </div>
            </div> -->

               <div>
                    <div id="campus-network-by-campus-type">
                    <h3 style="padding-left:2px; padding-bottom:3px">{% trans "network_heading" %}s</h3>
                    <table id="CampusNetwork" class="table table-condensed table-hover table-bordered">
                        <thead><tr><th>Id</th><th>Name</th><th>Description</th><th>Status</th></tr></thead>
                        <tbody></tbody>
                    </table>
                    </div>
            </div>
         </div>
    </div>
    <form id="campus-type-form" class="campus_type_form" role="form">
            <div id="add-campus-type-modal" class="modal fade" role="dialog">
                  <div class="modal-dialog modal-lg form-horizontal" style="width:700px">
                     <div class="modal-content">
                         <div class="modal-header">
                             <button type="button" class="close" data-dismiss="modal" >&times</button>
                             <h3 id="add_campus_type_header" class="modal-title">Add {% trans "network_type_heading" %}</h3>
                         </div>
                         <div id="campus_type_forms" class="modal-body">
                            <div id="campus_type_forms_inner_div"></div>
                          </div>
                         <div class="modal-footer">
                             <div class="row" style="padding-left:20px;padding-right:28px">
                                <div class="col-md-6 text-left">
                                    <button type="button" class="btn btn-info btn-sm" data-dismiss="modal">Cancel</button>
                                </div>
                                <div class="col-md-6 text-right">
                                    <button id="save-campus-btn" type="submit" class="btn btn-success btn-sm">Save</button>
                                </div>
                            </div>
                         </div>
                     </div>
                 </div>
             </div>
         </form>

         <form class="delete_campus_type_form">
            <div id="delete-campus-type-modal" class="modal fade" role="dialog">
                  <div class="modal-dialog modal-md form-horizontal" >
                     <div class="modal-content">
                         <div class="modal-header">
                             <button type="button" class="close" data-dismiss="modal" >&times</button>
                             <h3 class="modal-title">Delete {% trans "network_type_heading" %}</h3>
                         </div>

                          <div id="delete_campus_type_forms" class="modal-body">
                                Are you sure to delete the selected {% trans "network_type_heading" %} ?
                         </div>
                         <div class="modal-footer">
                             <div class="row" style="padding-left:20px;padding-right:28px">
                                <div class="col-md-6 text-left">
                                    <button id="campus-type-delete-cancel" type="button" class="btn btn-info btn-sm" data-dismiss="modal">Cancel</button>
                                </div>
                                <div class="col-md-6 text-right">
                                    <button id="campus-type-delete" type="button" onclick="deleteCampusTypesbyId(CAMPUS_TYPE_ID)" data-dismiss="modal" class="btn btn-danger btn-sm">Delete</button>
                                </div>
                            </div>
                         </div>
                     </div>
                 </div>
             </div>
         </form>
</body>
</html>
