<html>
    <head>
    <title>NITA</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        {% load static %}

    <style>
        ul.jqtree-tree .jqtree-title {
            margin-left: 0.5em;
        }
    </style>
    </head>

    <body>
    <div id="tree">
    </div>
    <script src="{% static 'components/tree/js/tree.jquery.js' %}"></script>
    <script src="{% static 'global/js/ngcn_tree.js' %}"></script>
    <script>
        // Initialise empty tree first, then populate from the REST API.
        $('#tree').tree({
            data: [],
            autoOpen: true,
            keyboardSupport: false,
            onCreateLi: function(node, $li) {
                var level = node.getLevel();
                if (level !== 1) {
                    $li.find('.jqtree-title')
                    .before('<span><img style="height:6px;width:6px;padding-left:3px" src="{% static "components/tree/images/tree-circle.png" %}"/></span>');
                }
            }
        });

        function loadApiTreeData() {
            var csrftoken = getCookie('csrftoken');
            var headers = {'X-CSRFToken': csrftoken};
            $.when(
                $.ajax({url: '/api/v1/network-types/?page_size=1000', headers: headers}),
                $.ajax({url: '/api/v1/networks/?page_size=1000',       headers: headers})
            ).done(function(typesResp, netsResp) {
                var types = typesResp[0].results || [];
                var nets  = netsResp[0].results  || [];
                var typeLabel    = (typeof campus_type_i18n    !== 'undefined' ? campus_type_i18n    : 'Network Type') + 's';
                var networkLabel = (typeof campus_network_i18n !== 'undefined' ? campus_network_i18n : 'Network') + 's';
                var treeData = [
                    {
                        name: typeLabel,
                        id: 'campus_type',
                        children: types.map(function(t) {
                            return {name: t.name, id: 'campustype_' + t.id};
                        })
                    },
                    {
                        name: networkLabel,
                        id: 'campus_network',
                        children: nets.map(function(n) {
                            return {name: n.name, id: 'campusnetwork_' + n.id};
                        })
                    }
                ];
                $('#tree').tree('loadData', treeData);
                var node = $('#tree').tree('getNodeById', 'campus_type');
                if (node) { $('#tree').tree('selectNode', node); }
            });
        }

        loadApiTreeData();
    </script>
    </body>
</html>
