openapi: 3.0.3
info:
  title: NITA Webapp API
  version: 1.0.0
paths:
  /api/v1/action-categories/:
    get:
      operationId: v1_action_categories_list
      description: Read-only list and retrieve for ActionCategory objects.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActionCategoryList'
          description: ''
  /api/v1/action-categories/{id}/:
    get:
      operationId: v1_action_categories_retrieve
      description: Read-only list and retrieve for ActionCategory objects.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this action category.
        required: true
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionCategory'
          description: ''
  /api/v1/action-history/:
    get:
      operationId: v1_action_history_list
      description: |-
        Read-only list and retrieve for ActionHistory objects, ordered newest-first.

        Supports ``?campus_network_id=<id>`` and ``?action_category_id=<id>`` query
        parameters (combinable) to filter history by network and/or category.
        The ``/console/`` action proxies the Jenkins console log for a given entry.
      parameters:
      - in: query
        name: action_category_id
        schema:
          type: integer
        description: Filter by action category ID.
      - in: query
        name: campus_network_id
        schema:
          type: integer
        description: Filter by campus network ID.
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActionHistoryList'
          description: ''
  /api/v1/action-history/{id}/:
    get:
      operationId: v1_action_history_retrieve
      description: |-
        Read-only list and retrieve for ActionHistory objects, ordered newest-first.

        Supports ``?campus_network_id=<id>`` and ``?action_category_id=<id>`` query
        parameters (combinable) to filter history by network and/or category.
        The ``/console/`` action proxies the Jenkins console log for a given entry.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this action history.
        required: true
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionHistory'
          description: ''
  /api/v1/action-history/{id}/console/:
    get:
      operationId: v1_action_history_console_retrieve
      description: Return the Jenkins console log for this action history entry.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this action history.
        required: true
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  console:
                    type: string
          description: ''
  /api/v1/action-history/{id}/stream/:
    get:
      operationId: v1_action_history_stream_retrieve
      description: Stream Jenkins console output as Server-Sent Events.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this action history.
        required: true
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            text/event-stream:
              schema:
                type: string
          description: 'SSE stream of Jenkins console output. Events: data (log line),
            done (build finished), error (Jenkins unreachable), timeout (30-min cap
            reached).'
  /api/v1/actions/:
    get:
      operationId: v1_actions_list
      description: |-
        Read-only list and retrieve for Action objects.

        Supports ``?campus_type_id=<id>`` and ``?action_category_id=<id>`` query
        parameters (combinable) to filter actions by network type and/or category.
      parameters:
      - in: query
        name: action_category_id
        schema:
          type: integer
        description: Filter by action category ID.
      - in: query
        name: campus_type_id
        schema:
          type: integer
        description: Filter by campus type ID.
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActionList'
          description: ''
  /api/v1/actions/{id}/:
    get:
      operationId: v1_actions_retrieve
      description: |-
        Read-only list and retrieve for Action objects.

        Supports ``?campus_type_id=<id>`` and ``?action_category_id=<id>`` query
        parameters (combinable) to filter actions by network type and/or category.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this action.
        required: true
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
          description: ''
  /api/v1/auth/csrf/:
    get:
      operationId: v1_auth_csrf_retrieve
      description: Return the current CSRF token as JSON. Also sets the csrftoken
        cookie.
      summary: Return the CSRF token (no authentication required)
      tags:
      - v1
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  csrfToken:
                    type: string
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: Authenticate and open a Django session. Requires a valid X-CSRFToken
        header.
      summary: Log in with username and password, open a Django session
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
              - username
              - password
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  username:
                    type: string
                  is_superuser:
                    type: boolean
          description: ''
        '400':
          description: Invalid credentials
        '403':
          description: CSRF verification failed
  /api/v1/auth/logout/:
    post:
      operationId: v1_auth_logout_create
      description: Destroy the current session. Authentication required.
      summary: Log out and destroy the current Django session
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '204':
          description: Session destroyed. No content.
  /api/v1/auth/me/:
    get:
      operationId: v1_auth_me_retrieve
      description: Return the authenticated user's id, username, and is_superuser.
      summary: Return the currently authenticated user's info
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  username:
                    type: string
                  is_superuser:
                    type: boolean
          description: ''
  /api/v1/auth/token/:
    post:
      operationId: v1_auth_token_create
      tags:
      - v1
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuthToken'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AuthToken'
          application/json:
            schema:
              $ref: '#/components/schemas/AuthToken'
        required: true
      security: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
          description: ''
  /api/v1/network-types/:
    get:
      operationId: v1_network_types_list
      description: Network types. Create via POST /upload/ (zip); delete via DELETE
        /{id}/.
      parameters:
      - in: query
        name: name
        schema:
          type: string
        description: Filter by network type name.
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCampusTypeList'
          description: ''
  /api/v1/network-types/{id}/:
    get:
      operationId: v1_network_types_retrieve
      description: Network types. Create via POST /upload/ (zip); delete via DELETE
        /{id}/.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus type.
        required: true
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusType'
          description: ''
    delete:
      operationId: v1_network_types_destroy
      description: Network types. Create via POST /upload/ (zip); delete via DELETE
        /{id}/.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus type.
        required: true
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/network-types/upload/:
    post:
      operationId: v1_network_types_upload_create
      description: Upload a network-type zip file to register a new CampusType.
      tags:
      - v1
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                app_zip_file:
                  type: string
                  format: binary
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                  name:
                    type: string
                  id:
                    type: integer
                required:
                - result
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                  reason:
                    type: string
                required:
                - result
                - reason
          description: ''
  /api/v1/networks/:
    get:
      operationId: v1_networks_list
      description: |-
        Full CRUD for CampusNetwork objects, plus workbook management and action triggering.

        Standard CRUD
            ``GET /api/v1/networks/``                — paginated list (filter: ``?campus_type_id=``)
            ``POST /api/v1/networks/``               — create
            ``GET /api/v1/networks/{id}/``           — retrieve
            ``PUT/PATCH /api/v1/networks/{id}/``     — update
            ``DELETE /api/v1/networks/{id}/``        — destroy

        Workbook actions
            ``POST   …/{id}/workbook/upload/``   — parse and store Excel data
            ``GET    …/{id}/workbook/``          — retrieve current grid data
            ``POST   …/{id}/workbook/save/``     — save edited grid data
            ``DELETE …/{id}/workbook/clear/``    — remove all grid data
            ``GET    …/{id}/workbook/download/`` — stream as ``.xlsx`` file

        Trigger
            ``POST …/{id}/trigger/{action_id}/`` — queue a Jenkins job;
            returns ``202 Accepted`` with ``action_history_id`` immediately.
            Poll ``GET /api/v1/action-history/{id}/`` for status.
      parameters:
      - in: query
        name: campus_type_id
        schema:
          type: integer
        description: Filter by campus type ID.
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCampusNetworkList'
          description: ''
    post:
      operationId: v1_networks_create
      description: |-
        Full CRUD for CampusNetwork objects, plus workbook management and action triggering.

        Standard CRUD
            ``GET /api/v1/networks/``                — paginated list (filter: ``?campus_type_id=``)
            ``POST /api/v1/networks/``               — create
            ``GET /api/v1/networks/{id}/``           — retrieve
            ``PUT/PATCH /api/v1/networks/{id}/``     — update
            ``DELETE /api/v1/networks/{id}/``        — destroy

        Workbook actions
            ``POST   …/{id}/workbook/upload/``   — parse and store Excel data
            ``GET    …/{id}/workbook/``          — retrieve current grid data
            ``POST   …/{id}/workbook/save/``     — save edited grid data
            ``DELETE …/{id}/workbook/clear/``    — remove all grid data
            ``GET    …/{id}/workbook/download/`` — stream as ``.xlsx`` file

        Trigger
            ``POST …/{id}/trigger/{action_id}/`` — queue a Jenkins job;
            returns ``202 Accepted`` with ``action_history_id`` immediately.
            Poll ``GET /api/v1/action-history/{id}/`` for status.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampusNetwork'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CampusNetwork'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CampusNetwork'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusNetwork'
          description: ''
  /api/v1/networks/{id}/:
    get:
      operationId: v1_networks_retrieve
      description: |-
        Full CRUD for CampusNetwork objects, plus workbook management and action triggering.

        Standard CRUD
            ``GET /api/v1/networks/``                — paginated list (filter: ``?campus_type_id=``)
            ``POST /api/v1/networks/``               — create
            ``GET /api/v1/networks/{id}/``           — retrieve
            ``PUT/PATCH /api/v1/networks/{id}/``     — update
            ``DELETE /api/v1/networks/{id}/``        — destroy

        Workbook actions
            ``POST   …/{id}/workbook/upload/``   — parse and store Excel data
            ``GET    …/{id}/workbook/``          — retrieve current grid data
            ``POST   …/{id}/workbook/save/``     — save edited grid data
            ``DELETE …/{id}/workbook/clear/``    — remove all grid data
            ``GET    …/{id}/workbook/download/`` — stream as ``.xlsx`` file

        Trigger
            ``POST …/{id}/trigger/{action_id}/`` — queue a Jenkins job;
            returns ``202 Accepted`` with ``action_history_id`` immediately.
            Poll ``GET /api/v1/action-history/{id}/`` for status.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusNetwork'
          description: ''
    put:
      operationId: v1_networks_update
      description: |-
        Full CRUD for CampusNetwork objects, plus workbook management and action triggering.

        Standard CRUD
            ``GET /api/v1/networks/``                — paginated list (filter: ``?campus_type_id=``)
            ``POST /api/v1/networks/``               — create
            ``GET /api/v1/networks/{id}/``           — retrieve
            ``PUT/PATCH /api/v1/networks/{id}/``     — update
            ``DELETE /api/v1/networks/{id}/``        — destroy

        Workbook actions
            ``POST   …/{id}/workbook/upload/``   — parse and store Excel data
            ``GET    …/{id}/workbook/``          — retrieve current grid data
            ``POST   …/{id}/workbook/save/``     — save edited grid data
            ``DELETE …/{id}/workbook/clear/``    — remove all grid data
            ``GET    …/{id}/workbook/download/`` — stream as ``.xlsx`` file

        Trigger
            ``POST …/{id}/trigger/{action_id}/`` — queue a Jenkins job;
            returns ``202 Accepted`` with ``action_history_id`` immediately.
            Poll ``GET /api/v1/action-history/{id}/`` for status.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampusNetwork'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CampusNetwork'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CampusNetwork'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusNetwork'
          description: ''
    patch:
      operationId: v1_networks_partial_update
      description: |-
        Full CRUD for CampusNetwork objects, plus workbook management and action triggering.

        Standard CRUD
            ``GET /api/v1/networks/``                — paginated list (filter: ``?campus_type_id=``)
            ``POST /api/v1/networks/``               — create
            ``GET /api/v1/networks/{id}/``           — retrieve
            ``PUT/PATCH /api/v1/networks/{id}/``     — update
            ``DELETE /api/v1/networks/{id}/``        — destroy

        Workbook actions
            ``POST   …/{id}/workbook/upload/``   — parse and store Excel data
            ``GET    …/{id}/workbook/``          — retrieve current grid data
            ``POST   …/{id}/workbook/save/``     — save edited grid data
            ``DELETE …/{id}/workbook/clear/``    — remove all grid data
            ``GET    …/{id}/workbook/download/`` — stream as ``.xlsx`` file

        Trigger
            ``POST …/{id}/trigger/{action_id}/`` — queue a Jenkins job;
            returns ``202 Accepted`` with ``action_history_id`` immediately.
            Poll ``GET /api/v1/action-history/{id}/`` for status.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCampusNetwork'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCampusNetwork'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCampusNetwork'
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusNetwork'
          description: ''
    delete:
      operationId: v1_networks_destroy
      description: |-
        Full CRUD for CampusNetwork objects, plus workbook management and action triggering.

        Standard CRUD
            ``GET /api/v1/networks/``                — paginated list (filter: ``?campus_type_id=``)
            ``POST /api/v1/networks/``               — create
            ``GET /api/v1/networks/{id}/``           — retrieve
            ``PUT/PATCH /api/v1/networks/{id}/``     — update
            ``DELETE /api/v1/networks/{id}/``        — destroy

        Workbook actions
            ``POST   …/{id}/workbook/upload/``   — parse and store Excel data
            ``GET    …/{id}/workbook/``          — retrieve current grid data
            ``POST   …/{id}/workbook/save/``     — save edited grid data
            ``DELETE …/{id}/workbook/clear/``    — remove all grid data
            ``GET    …/{id}/workbook/download/`` — stream as ``.xlsx`` file

        Trigger
            ``POST …/{id}/trigger/{action_id}/`` — queue a Jenkins job;
            returns ``202 Accepted`` with ``action_history_id`` immediately.
            Poll ``GET /api/v1/action-history/{id}/`` for status.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/networks/{id}/trigger/{action_id}/:
    post:
      operationId: v1_networks_trigger_create
      description: |-
        Trigger a Jenkins action for this network.

        Communicates with Jenkins using unauthenticated plain HTTP on the
        internal service network (jenkins:8080). No credentials or CSRF crumb
        are sent. Jenkins must be configured to allow anonymous Job/Build access
        on the internal port.

        Returns 202 Accepted with the ActionHistory ID immediately.
        Poll GET /api/v1/action-history/{id}/ for status updates.
      parameters:
      - in: path
        name: action_id
        schema:
          type: integer
        description: A unique integer value identifying the action to trigger.
        required: true
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  action_history_id:
                    type: integer
          description: ''
  /api/v1/networks/{id}/workbook/:
    get:
      operationId: v1_networks_workbook_retrieve
      description: |-
        Return the current configuration grid data for this network.

        Each sheet is returned as ``{"name", "headers", "rows"}`` where
        ``headers`` is the list of column names and ``rows`` is a list of
        value arrays (one array per data row).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  workbook:
                    type: array
                    maxItems: 1000
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        data:
                          oneOf:
                          - type: object
                          - type: array
                            maxItems: 1000
                          - type: string
                      required:
                      - name
                      - data
                required:
                - status
                - workbook
          description: ''
  /api/v1/networks/{id}/workbook/clear/:
    delete:
      operationId: v1_networks_workbook_clear_destroy
      description: Delete all configuration grid data for this network.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/networks/{id}/workbook/download/:
    get:
      operationId: v1_networks_workbook_download_retrieve
      description: Download the configuration data as an Excel file.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
          description: Excel workbook
  /api/v1/networks/{id}/workbook/save/:
    post:
      operationId: v1_networks_workbook_save_create
      description: |-
        Save updated configuration grid data for this network.

        Expects a JSON body ``{"data": [{"name": "...", "headers": [...], "rows": [[...]]}]}``.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
          description: ''
