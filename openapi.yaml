openapi: 3.0.3
info:
  title: NITA Webapp API
  version: 1.0.0
servers:
  - url: https://{host}
    description: NITA Webapp (HTTPS)
    variables:
      host:
        default: localhost
security:
  - cookieAuth: []
  - tokenAuth: []
paths:
  /api/v1/action-categories/:
    get:
      operationId: v1_action_categories_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActionCategoryList'
          description: ''
  /api/v1/action-categories/{id}/:
    get:
      operationId: v1_action_categories_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this action category.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionCategory'
          description: ''
  /api/v1/action-history/:
    get:
      operationId: v1_action_history_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActionHistoryList'
          description: ''
  /api/v1/action-history/{id}/:
    get:
      operationId: v1_action_history_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this action history.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionHistory'
          description: ''
  /api/v1/action-history/{id}/console/:
    get:
      operationId: v1_action_history_console_retrieve
      description: Return the Jenkins console log for this action history entry.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this action history.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  console:
                    type: string
          description: ''
  /api/v1/actions/:
    get:
      operationId: v1_actions_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActionList'
          description: ''
  /api/v1/actions/{id}/:
    get:
      operationId: v1_actions_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this action.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
          description: ''
  /api/v1/auth/token/:
    post:
      operationId: v1_auth_token_create
      tags:
      - v1
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuthToken'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AuthToken'
          application/json:
            schema:
              $ref: '#/components/schemas/AuthToken'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
          description: ''
  /api/v1/network-types/:
    get:
      operationId: v1_network_types_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCampusTypeList'
          description: ''
  /api/v1/network-types/{id}/:
    get:
      operationId: v1_network_types_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus type.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusType'
          description: ''
    delete:
      operationId: v1_network_types_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus type.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/networks/:
    get:
      operationId: v1_networks_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCampusNetworkList'
          description: ''
    post:
      operationId: v1_networks_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampusNetwork'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CampusNetwork'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CampusNetwork'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusNetwork'
          description: ''
  /api/v1/networks/{id}/:
    get:
      operationId: v1_networks_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusNetwork'
          description: ''
    put:
      operationId: v1_networks_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampusNetwork'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CampusNetwork'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CampusNetwork'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusNetwork'
          description: ''
    patch:
      operationId: v1_networks_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCampusNetwork'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCampusNetwork'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCampusNetwork'
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusNetwork'
          description: ''
    delete:
      operationId: v1_networks_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/networks/{id}/trigger/{action_id}/:
    post:
      operationId: v1_networks_trigger_create
      description: |-
        Trigger a Jenkins action for this network.

        Returns 202 Accepted with the ActionHistory ID immediately.
        Poll GET /api/v1/action-history/{id}/ for status updates.
      parameters:
      - in: path
        name: action_id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampusNetwork'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CampusNetwork'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CampusNetwork'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  action_history_id:
                    type: integer
          description: ''
  /api/v1/networks/{id}/workbook/:
    get:
      operationId: v1_networks_workbook_retrieve
      description: Return the current configuration grid data for this network.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workbook'
          description: ''
  /api/v1/networks/{id}/workbook/clear/:
    delete:
      operationId: v1_networks_workbook_clear_destroy
      description: Delete all configuration grid data for this network.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/networks/{id}/workbook/download/:
    get:
      operationId: v1_networks_workbook_download_retrieve
      description: Download the configuration data as an Excel file.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusNetwork'
          description: ''
  /api/v1/networks/{id}/workbook/save/:
    post:
      operationId: v1_networks_workbook_save_create
      description: Save updated configuration grid data for this network.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  maxItems: 1000
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
          description: ''
  /api/v1/networks/{id}/workbook/upload/:
    post:
      operationId: v1_networks_workbook_upload_create
      description: Upload an Excel workbook to populate configuration data for this
        network.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this campus network.
        required: true
      tags:
      - v1
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                up_file:
                  type: string
                  format: binary
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workbook'
          description: ''
components:
  schemas:
    Action:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        action_property:
          allOf:
          - $ref: '#/components/schemas/ActionProperty'
          readOnly: true
        action_category:
          allOf:
          - $ref: '#/components/schemas/ActionCategory'
          readOnly: true
        action_name:
          type: string
          maxLength: 255
        jenkins_url:
          type: string
          title: Jenkins Action Url
          maxLength: 255
        campus_type_id:
          type: integer
      required:
      - action_category
      - action_name
      - action_property
      - campus_type_id
      - id
      - jenkins_url
    ActionCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        category_name:
          type: string
          maxLength: 255
      required:
      - category_name
      - id
    ActionHistory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        action_name:
          type: string
          readOnly: true
        category_name:
          type: string
          readOnly: true
        network_name:
          type: string
          readOnly: true
        timestamp:
          type: string
          format: date-time
        status:
          type: string
          maxLength: 255
        jenkins_job_build_no:
          type: integer
          title: Jenkins Job Id
        action_id:
          type: integer
        category_id:
          type: integer
        campus_network_id:
          type: integer
      required:
      - action_id
      - action_name
      - campus_network_id
      - category_id
      - category_name
      - id
      - jenkins_job_build_no
      - network_name
      - status
      - timestamp
    ActionProperty:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        shell_command:
          type: string
          maxLength: 255
        output_path:
          type: string
          nullable: true
          maxLength: 255
        custom_workspace:
          type: string
          nullable: true
          title: Output Path
          maxLength: 255
      required:
      - id
      - shell_command
    AuthToken:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        token:
          type: string
          readOnly: true
      required:
      - password
      - token
      - username
    CampusNetwork:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        campus_type_name:
          type: string
          readOnly: true
        name:
          type: string
          title: Network Name
          maxLength: 255
        status:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 255
        host_file:
          type: string
        dynamic_ansible_workspace:
          type: boolean
        campus_type:
          type: integer
          title: Network Type
      required:
      - campus_type
      - campus_type_name
      - description
      - host_file
      - id
      - name
      - status
    CampusType:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        roles:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/Role'
          readOnly: true
        resources:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/Resource'
          readOnly: true
        name:
          type: string
          title: Network Type Name
          maxLength: 255
        description:
          type: string
          maxLength: 255
        app_zip_name:
          type: string
          maxLength: 255
      required:
      - app_zip_name
      - description
      - id
      - name
      - resources
      - roles
    PaginatedActionCategoryList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/ActionCategory'
    PaginatedActionHistoryList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/ActionHistory'
    PaginatedActionList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/Action'
    PaginatedCampusNetworkList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/CampusNetwork'
    PaginatedCampusTypeList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/CampusType'
    PatchedCampusNetwork:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        campus_type_name:
          type: string
          readOnly: true
        name:
          type: string
          title: Network Name
          maxLength: 255
        status:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 255
        host_file:
          type: string
        dynamic_ansible_workspace:
          type: boolean
        campus_type:
          type: integer
          title: Network Type
    Resource:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
      required:
      - id
      - name
    Role:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
      required:
      - id
      - name
    Workbook:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        campus_network_id:
          type: integer
          title: Network
        sheets:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/Worksheets'
          readOnly: true
      required:
      - campus_network_id
      - id
      - name
      - sheets
    Worksheets:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        data:
          oneOf:
          - type: object
          - type: array
            maxItems: 1000
          - type: string
          readOnly: true
      required:
      - data
      - id
      - name
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
