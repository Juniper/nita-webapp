# CI MariaDB deployment — uses emptyDir (no PersistentVolume required)
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: nita
  name: db
  labels:
    io.kompose.service: db
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: db
    spec:
      containers:
        - name: db
          image: mariadb:10.4.12
          args:
            - --default-authentication-plugin=mysql_native_password
          env:
            - name: MYSQL_DATABASE
              value: Sites
            - name: MYSQL_ROOT_PASSWORD
              value: root
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mysql -u root -proot -e "SELECT 1"
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
          volumeMounts:
            - mountPath: /var/lib/mysql
              name: mariadb-data
      restartPolicy: Always
      volumes:
        - name: mariadb-data
          emptyDir: {}
