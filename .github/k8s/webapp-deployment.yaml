apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: nita
  name: webapp
  labels:
    io.kompose.service: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: webapp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: webapp
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: webapp
          image: ${CONTAINER_REGISTRY}/nita-webapp:latest
          imagePullPolicy: Always
          args:
            - ./build-and-test-webapp/wait-for-db.sh
          env:
            - name: DJANGO_LOG_LEVEL
              value: WARNING
            - name: DJANGO_SECRET_KEY
              value: ci-only-insecure-secret-key-do-not-use-in-production
            - name: DJANGO_ALLOWED_HOSTS
              value: "*"
            - name: CSRF_TRUSTED_ORIGINS
              value: http://localhost:8000
            - name: WEBAPP_USER
              value: admin
            - name: WEBAPP_PASS
              value: admin123
          readinessProbe:
            httpGet:
              path: /api/v1/action-categories/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30   # up to 5 minutes — webapp waits for Jenkins
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
      restartPolicy: Always
