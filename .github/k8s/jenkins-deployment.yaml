apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: nita
  labels:
    io.kompose.service: jenkins
  name: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: jenkins
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: jenkins
    spec:
      serviceAccount: internal-jenknis-pod
      securityContext:
        fsGroup: 1000
        runAsUser: 0
      imagePullSecrets:
        - name: regcred
      containers:
        - name: jenkins
          image: ${CONTAINER_REGISTRY}/nita-jenkins:latest
          imagePullPolicy: Always
          env:
            # HTTP only — no keystore, no certificate lifecycle hook needed
            - name: JENKINS_OPTS
              value: "--httpPort=8080 --httpListenAddress=0.0.0.0"
          ports:
            - containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18   # allow up to 3 minutes for Jenkins to start
          resources: {}
          volumeMounts:
            - mountPath: /var/jenkins_home
              name: jenkins-home
            - mountPath: /project
              name: project
      restartPolicy: Always
      volumes:
        - name: jenkins-home
          emptyDir: {}
        - name: project
          emptyDir: {}
