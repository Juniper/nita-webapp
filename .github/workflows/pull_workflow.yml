name: Pull workflow

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: read-all

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Lint Code Base
        uses: super-linter/super-linter@v8.6.0
        env:
          # Lint only files changed in the PR to avoid unrelated legacy/vendor churn.
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_JAVASCRIPT_ES: true
          VALIDATE_PYTHON_BLACK: true
          # HTML excluded: Django templates contain {% %}/{{ }} syntax that
          # htmlhint cannot parse; results are meaningless false positives.
          JAVASCRIPT_ES_CONFIG_FILE: eslint.config.mjs
          FILTER_REGEX_EXCLUDE: .*(components/|jquery-|jquery\.event|bootstrap\.min|ui_1\.11\.4|\.min\.js|\.min\.css).*
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    name: Static Security
    runs-on: ubuntu-latest
    permissions:
      security-events: write


    steps:

      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Run Microsoft Security DevOps
        uses: microsoft/security-devops-action@v1.12.0
        id: msdo

      - name: Upload results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}

  django-pytest:
    name: Django Pytest
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: ngcn_workbench.test_settings

    defaults:
      run:
        working-directory: build-and-test-webapp/nita-webapp/ngcn_workbench

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmysqlclient-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          grep -v '^nita-yaml-to-excel-22.8/$' ../../../requirements.txt > /tmp/requirements-ci.txt
          pip install -r /tmp/requirements-ci.txt
          pip install -r ../../../requirements-test.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run pytest suite
        run: |
          cd ../../../
          pytest -q

      - name: Upload GUI screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-gui-screenshots
          path: ci-screenshots/
          if-no-files-found: ignore
