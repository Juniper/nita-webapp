name: Pull workflow

on:  
  pull_request:
    branches:
      - main
  workflow_dispatch:    

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint Code Base
        uses: github/super-linter@v4
        env:
          VALIDATE_ALL_CODEBASE: true
          VALIDATE_JAVASCRIPT_ES: true
          VALIDATE_PYTHON_BLACK: true
          VALIDATE_HTML: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}    

  security:
    name: Static Security 
    runs-on: ubuntu-latest
    permissions:
      security-events: write


    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Microsoft Security DevOps
        uses: microsoft/security-devops-action@latest
        id: msdo    

      - name: Upload results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}

  django-pytest:
    name: Django Pytest
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: ngcn_workbench.test_settings

    defaults:
      run:
        working-directory: build-and-test-webapp/nita-webapp/ngcn_workbench

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmysqlclient-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade "pip<24.1"
          grep -v '^nita-yaml-to-excel-22.8/$' ../../../requirements.txt > /tmp/requirements-ci.txt
          pip install -r /tmp/requirements-ci.txt
          pip install -r ../../../requirements-test.txt

      - name: Run pytest suite
        run: |
          cd ../../../
          pytest -q
