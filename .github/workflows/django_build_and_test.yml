name: Django Build and Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  django-build-test:
    name: Build and test build-and-test-webapp
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: ngcn_workbench.test_settings

    defaults:
      run:
        working-directory: build-and-test-webapp/nita-webapp/ngcn_workbench

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmysqlclient-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          grep -v '^nita-yaml-to-excel-22.8/$' ../../../requirements.txt \
            > /tmp/requirements-ci.txt
          pip install -r /tmp/requirements-ci.txt
          pip install -r ../../../requirements-test.txt
          # python-jenkins 1.8.0 requires setuptools<66, which downgrades
          # pkg_resources to a version that still uses pkgutil.ImpImporter,
          # removed in Python 3.12.  Re-upgrade after all requirements are
          # installed so the runtime uses a fixed pkg_resources.
          pip install --upgrade setuptools

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Validate Django project
        run: python manage.py check

      - name: Run unified test suite (pytest)
        run: |
          cd ../../../
          pytest -v

      - name: Upload GUI screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-gui-screenshots
          path: ci-screenshots/
          if-no-files-found: ignore

      - name: Write screenshots to job summary
        if: always()
        run: |
          if compgen -G "ci-screenshots/*.png" > /dev/null 2>&1; then
            echo "## API GUI Snapshots" >> "$GITHUB_STEP_SUMMARY"
            for f in ci-screenshots/*.png; do
              name=$(basename "$f" .png | sed 's/_/ /g')
              echo "### ${name}" >> "$GITHUB_STEP_SUMMARY"
            done
          fi
