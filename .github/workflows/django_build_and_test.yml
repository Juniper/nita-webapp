name: Django Build and Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  django-build-test:
    name: Build and test build-and-test-webapp
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: ngcn_workbench.test_settings

    defaults:
      run:
        working-directory: build-and-test-webapp/nita-webapp/ngcn_workbench

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout nita (evpn_vxlan_erb_dc fixture data)
        uses: actions/checkout@v4
        with:
          repository: aburston/nita
          # _HERE.parents[4] in test_evpn_vxlan_erb_dc.py resolves to
          # /home/runner/work/nita-webapp/, so the nita examples directory
          # must be at /home/runner/work/nita-webapp/nita/examples/.
          path: ../nita

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmysqlclient-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          grep -v '^nita-yaml-to-excel-22.8/$' ../../../requirements.txt \
            > /tmp/requirements-ci.txt
          pip install -r /tmp/requirements-ci.txt
          pip install -r ../../../requirements-test.txt
          # python-jenkins 1.8.0 requires setuptools<66, which downgrades
          # pkg_resources to a version that still uses pkgutil.ImpImporter,
          # removed in Python 3.12.  Re-upgrade after all requirements are
          # installed so the runtime uses a fixed pkg_resources.
          pip install --upgrade setuptools

      - name: Validate Django project
        run: python manage.py check

      - name: Run unified test suite (pytest)
        run: |
          cd ../../../
          pytest -v
