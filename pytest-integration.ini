[pytest]
# Configuration for end-to-end integration tests.
# Run with: pytest -c pytest-integration.ini
#
# These tests require a live NITA webapp and do NOT use Django's test DB.
# DJANGO_SETTINGS_MODULE is intentionally absent.
testpaths = tests/integration
python_files = test_*.py
markers =
    integration: end-to-end tests against a live NITA webapp instance
addopts = -ra -v
