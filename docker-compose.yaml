version: "2.0"
services:
  webapp:
    image: juniper/nita-webapp:22.8-1
    command: ./build-and-test-webapp/wait-for-db.sh
    networks:
      - nita-network
    depends_on: [ db ]
    environment:
      - DJANGO_LOG_LEVEL=DEBUG
      - DJANGO_SECRET_KEY
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS
      - CSRF_TRUSTED_ORIGINS
      - WEBAPP_USER
      - WEBAPP_PASS
      - JENKINS_USER
      - JENKINS_PASS
      - JENKINS_PORT
      - JENKINS_URL
    restart: always
#
# For external Jenkins hosts, uncomment the lines below and change IP
# Jenkins' server IP address. This allows the name Jenkins to resolve
# properly in the container environment. Please see detailed instructions
# in README file for implications of this change.
#
#    extra_hosts:
#      - "jenkins:192.168.X.y"
  db:
    image: mariadb:10.4.12
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: Sites
      MYSQL_ROOT_PASSWORD: root
    networks:
      - nita-network
    volumes:
      - "mariadb:/var/lib/mysql"
    restart: always
  proxy:
    image: nginx:stable
    volumes:
      - "./nginx/nginx.conf:/etc/nginx/nginx.conf"
      - "./nginx/certificates/:/etc/certificate/"
    ports:
      - "443:443"
    networks:
      - nita-network
    depends_on: [ webapp ]
    restart: always
volumes:
  mariadb:
networks:
  nita-network:
    external: true
